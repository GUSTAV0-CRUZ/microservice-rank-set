name: Micro-admin-backend

on:
  push:
    branches: [ main ]
    paths:
      - 'micro-admin-backend/**'
  pull_request:
    branches: [ main ]

jobs:
  unit-tests-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: micro-admin-backend/package-lock.json

      - name: Instalar dependências
        run: |
          cd micro-admin-backend
          npm install

      - name: Executar testes unitários
        run: |
          cd micro-admin-backend
          npm run test

      - name: Validar Build do Docker
        uses: docker/build-push-action@v5
        with:
          context: ./micro-admin-backend
          push: false