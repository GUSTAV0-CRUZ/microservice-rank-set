version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-local
    restart: always
    ports:
      - "5672:5672"   # Porta AMQP (Microserviços)
      - "15672:15672" # Porta Dashboard (Navegador)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway-local
    restart: always
    ports:
      - "8080:3000" # Exemplo: Acessar via http://localhost:8080
    env_file:
      - ./api-gateway/.env
    depends_on:
      - rabbitmq

  micro-admin-backend:
    build:
      context: ./micro-admin-backend
      dockerfile: Dockerfile
    container_name: micro-admin-local
    restart: always
    env_file:
      - ./micro-admin-backend/.env
    depends_on:
      - rabbitmq

volumes:
  rabbitmq_data: